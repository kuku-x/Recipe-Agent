<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI菜谱知识图谱生成器</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍳 AI菜谱知识图谱生成器</h1>
            <p class="subtitle">基于Kimi大模型的智能菜谱解析系统</p>
        </header>



        <div class="main-content">
            <div class="sidebar">
                <nav class="nav-menu">
                    <button class="nav-item active" data-tab="home">
                        <span class="icon">🏠</span>
                        <span>首页</span>
                    </button>

                    <button class="nav-item" data-tab="config">
                        <span class="icon">⚙️</span>
                        <span>系统配置</span>
                    </button>
                </nav>
            </div>

            <div class="content-area">
                <div id="homeTab" class="tab-content active">
                    <div class="chat-container">
                        <div class="chat-header">
                            <h2>🤖 AI 菜谱助手</h2>
                            <p>我是您的智能菜谱助手，可以帮您解析菜谱、查询食材、推荐菜品等</p>
                        </div>
                        
                        <div class="chat-messages" id="chatMessages">
                            <div class="message ai-message">
                                <div class="message-avatar">🤖</div>
                                <div class="message-content">
                                    <p>您好！我是AI菜谱助手。我可以帮您：</p>
                                    <ul>
                                        <li>🔍 解析菜谱内容，提取食材和步骤</li>
                                        <li>📚 批量处理菜谱文件</li>
                                        <li>🍳 根据食材推荐菜谱</li>
                                        <li>📊 生成知识图谱数据</li>
                                    </ul>
                                    <p>请问有什么可以帮您的吗？</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="chat-input-area">
                            <div class="quick-actions-bar">
                                <button class="quick-btn" onclick="sendQuickMessage('川菜有哪些特色菜？')">🌶️ 川菜特色</button>
                                <button class="quick-btn" onclick="sendQuickMessage('如何制作红烧肉？')">🥩 红烧肉做法</button>
                                <button class="quick-btn" onclick="sendQuickMessage('夏天适合吃什么菜？')">☀️ 夏季推荐</button>
                                <button class="quick-btn" onclick="sendQuickMessage('推荐几道家常菜')">🏠 家常菜</button>
                            </div>
                            <div class="chat-input-box">
                                <textarea id="chatInput" placeholder="输入您的问题..." rows="2"></textarea>
                                <button class="send-btn" onclick="sendMessage()">发送</button>
                            </div>
                        </div>
                    </div>
                </div>



                <div id="configTab" class="tab-content">
                    <h2>系统配置</h2>
                    <div class="config-form">
                        <div class="config-section">
                            <h3>API配置</h3>
                            <div class="form-group">
                                <label for="apiKey">Kimi API密钥</label>
                                <input type="password" id="apiKey" placeholder="请输入API密钥">
                            </div>
                            <div class="form-group">
                                <label for="apiBaseUrl">API基础URL</label>
                                <input type="text" id="apiBaseUrl" value="https://api.moonshot.cn/v1">
                            </div>
                            <div class="form-group">
                                <label for="apiModel">API模型</label>
                                <input type="text" id="apiModel" value="kimi-k2-0711-preview">
                            </div>
                        </div>



                        <div class="config-section">
                            <h3>输出配置</h3>
                            <div class="form-group">
                                <label for="outputDirectory">输出目录</label>
                                <input type="text" id="outputDirectory" value="./ai_output">
                            </div>
                            <div class="form-group">
                                <label for="outputFormat">输出格式</label>
                                <select id="outputFormat">
                                    <option value="neo4j">Neo4j</option>
                                    <option value="csv">CSV</option>
                                    <option value="rf2">RF2</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="saveConfig()">
                                <span class="icon">💾</span>
                                保存配置
                            </button>
                            <button class="btn btn-info" onclick="testConnection()">
                                <span class="icon">🔌</span>
                                测试连接
                            </button>
                            <button class="btn btn-secondary" onclick="loadConfig()">
                                <span class="icon">🔄</span>
                                重新加载
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <div id="notification" class="notification hidden"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
